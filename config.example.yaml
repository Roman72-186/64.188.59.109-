# ============================================================================
#  Конфигурация прокладки Т-Банк <-> shalamov.io
#  Скопировать в config.yaml и заполнить. config.yaml — в .gitignore.
#  ВСЕ настройки проекта здесь. Код под конкретный проект не правится.
# ============================================================================

tbank:
  terminal_key: "CHANGE_ME"          # TerminalKey из ЛК Т-Банка
  terminal_password: "CHANGE_ME"     # пароль терминала (для подписи Token)
  api_url: "https://securepay.tinkoff.ru/v2"   # боевой
  # тестовый: "https://rest-api-test.tinkoff.ru/v2"
  timeout_seconds: 15
  # ── Доп. терминалы (отдельные магазины Т-Банка) под конкретные способы ЭКВАЙРИНГА.
  # Нужны, когда форма должна показывать ТОЛЬКО один способ (напр. Рассрочка): в API
  # это задаётся не запросом, а терминалом, где включён лишь нужный способ. Заведи
  # отдельный магазин с одним способом, пропиши его ключи здесь и сошлись на имя
  # из payment_methods[*].terminal. api_url/timeout наследуются от основного.
  # (Для Долями это НЕ нужно — она ведётся отдельным провайдером, см. блок dolyame ниже.)
  # extra_terminals:
  #   installment_shop:
  #     terminal_key: "CHANGE_ME"
  #     terminal_password: "CHANGE_ME"

server:
  host: "0.0.0.0"
  port: 8000
  public_url: "https://your-domain.ru"   # публичный адрес прокладки (для webhook Т-Банка)
  # секрет для защиты /init-payment. Сгенерировать:
  #   python -c "import secrets; print(secrets.token_hex(32))"
  secret_token: "CHANGE_ME"

# ── shalamov.io: конфиг-адаптер ──────────────────────────────────────────────
# Когда узнаешь точные пути/формат — правишь ТОЛЬКО этот блок, код не трогаешь.
# Плейсхолдеры (в query_template и body_template): {contact_id}, {tag},
# {variables} (последний — JSON-объект переменных).
# Авторизация: in: header (по умолчанию, заголовок) или in: query (?param=value).
# Параметры можно слать через query_template (query-строка) и/или body_template
# (JSON-тело); пустое body_template => тело не отправляется.
shalamo:
  # Реальный API shalamov.io (семейство WatBot): база включает /api/v1.
  api_url: "https://app.shalamov.io/api/v1"
  api_key: "CHANGE_ME"
  # Таймаут одного запроса. Внутри webhook делается до 2 попыток, поэтому
  # timeout_seconds * 2 должно укладываться в таймаут webhook Т-Банка (~10с).
  timeout_seconds: 3
  auth:
    in: "query"                  # ключ уходит как ?api_token=...
    param: "api_token"
    value_template: "{api_key}"
  # POST /attachTagToContact?api_token=...&contact_id=...&name=<тег>
  assign_tag:
    method: "POST"
    path: "/attachTagToContact"
    query_template:
      contact_id: "{contact_id}"
      name: "{tag}"
    success_when:                # как определять успех ответа (опц.)
      http_2xx: true
  # Переменные контакта — опционально и best-effort. Если блок отсутствует/закомментирован,
  # шаг пропускается (тег это не блокирует). Включить, когда известен реальный endpoint.
  # set_variables:
  #   method: "POST"
  #   path: "/attachVariableToContact"
  #   query_template:
  #     contact_id: "{contact_id}"
  #     name: "{variables}"
  #   success_when:
  #     http_2xx: true

# ── Чек 54-ФЗ (Receipt) ─────────────────────────────────────────────────────
# Боевой терминал с подключённой кассой ТРЕБУЕТ Receipt в Init, иначе ошибка
# 309 {request.validate.expected.receipt}. Если терминал без фискализации
# (или тестовый) — оставь enabled: false / удали блок, тогда чек не отправляется.
# Чек собирается из одной позиции = оплачиваемый товар (Name/Amount берутся из
# products). Контакт получателя чека (Email/Phone) обязателен по 54-ФЗ: его шлёт
# бот в /init-payment (поля email/phone), иначе берётся fallback ниже.
receipt:
  enabled: false
  taxation: "usn_income"      # система налогообложения — УТОЧНИ свою:
                              # osn | usn_income | usn_income_outcome | patent | envd | esn
  tax: "none"                 # ставка НДС позиции: none | vat0 | vat10 | vat20 | vat110 | vat120
  payment_object: "service"   # признак предмета расчёта (курс/услуга = service)
  payment_method: "full_prepayment"  # признак способа расчёта (предоплата 100%)
  email: ""                   # fallback-email для чека, если бот не передал (опц.)
  phone: ""                   # fallback-телефон (опц.)

# ── Долями: прямой Partner API (mTLS + Basic) ───────────────────────────────
# Отдельный ПРОВАЙДЕР оплаты, НЕ эквайринг Т-Банка. Нужен, когда требуется форма
# «только Долями» (в эквайринге Т-Банка обязательные способы из формы не убрать).
# Включается на способе оплаты через `provider: dolyame` (см. payment_methods ниже).
# Поток: /init-payment -> POST /v1/orders/create -> link (pay_url) -> оплата 25%
# -> webhook (статус wait_for_commit) -> прокладка зовёт commit -> тег в shalamov.io.
# dolyame:
#   base_url: "https://partner.dolyame.ru"
#   login: "CHANGE_ME"
#   password: "CHANGE_ME"
#   # Клиентский сертификат mTLS из ЛК Т-Бизнеса — ОБЯЗАТЕЛЕН на каждый запрос.
#   cert_path: ""              # путь к .crt/.pem (без него TLS-handshake не пройдёт)
#   key_path: ""               # путь к .key
#   timeout_seconds: 5
#   fiscalization: "disabled"  # disabled | enabled (fiscalization_settings в API)
#   commit_on_webhook: true    # на wait_for_commit синхронно делать commit, затем тег
#   webhook_allowed_subnet: "91.194.226.0/23"  # webhook'и принимаем только отсюда

# ── T-Bank Credit Broker (forma.tbank.ru) — кредит/рассрочка ────────────────
# Отдельный провайдер для крупных сумм. Включается через `provider: tbank_credit`
# в payment_methods. Покупателю предлагается оформить кредит или рассрочку.
# Параметры shopId/showcaseId/promoCode — из ЛК Т-Бизнеса (раздел POS-кредитование).
#
# Авто-апгрейд (credit_threshold_kopecks): если amount >= порога и у товара есть
# tbank_credit-метод — прокладка автоматически переключается на кредит, даже если
# бот запросил другой способ оплаты. 3 000 000 копеек = 30 000 рублей.
#
# credit_threshold_kopecks: 3000000
#
# tbank_credit:
#   shop_id: "CHANGE_ME"           # ShopId из ЛК (код организации)
#   showcase_id: "CHANGE_ME"       # ShowcaseId (код веб-ресурса)
#   api_password: "CHANGE_ME"      # пароль API (Магазины -> Настройки API в ЛК)
#   promo_code: "default"          # PromoCode продукта (рассрочка/кредит); опц.,
#                                   # string(64), по умолчанию "default" (если в ЛК
#                                   # подключён один продукт — оставить как есть)
#   api_url: "https://forma.tbank.ru/api/partners/v2"   # боевой
#   # тестовый: "https://forma.tinkoff.ru/api/partners/v2"
#   timeout_seconds: 15
#   commit_on_webhook: false        # false = авто-подтверждение в ЛК (рекомендуется);
#                                   # true = ручной Commit через API (14 дней после signed)
#   webhook_allowed_subnet: ""      # CIDR подсети Credit Broker; пусто = принимать от всех
#   success_url: ""                 # URL перехода после успешной заявки (опц.)
#   fail_url: ""
#   return_url: ""

# ── Способы оплаты: общие доп. параметры Init Т-Банка ───────────────────────
payment_methods:
  card:
    label: "Банковская карта"
    extra_params: {}
  sbp:
    label: "СБП"
    extra_params:
      PayType: "O"
  dolyami:
    label: "Долями"
    extra_params:
      PayType: "O"
    # provider: dolyame        # ⬅ прямой Partner API Долями (НЕ эквайринг Т-Банка);
    #                            требует блока `dolyame:` ниже. Даёт Долями-only форму.
  installment:
    label: "Рассрочка"
    extra_params:
      PayType: "O"
    # terminal: installment_shop  # вести через отдельный магазин (см. tbank.extra_terminals)
  # credit:
  #   label: "Кредит/рассрочка"
  #   provider: tbank_credit      # ⬅ Credit Broker (forma.tbank.ru); требует блока tbank_credit

# ── Товары. Ключ словаря = product_id, который передаёт бот ─────────────────
products:
  course_basic:
    name: "Курс: Базовый тариф"
    # amount не задаётся — платформа (бот/shalamov.io) всегда передаёт сумму
    # в поле amount запроса /init-payment (в копейках: 9900 = 99 руб)
    description: "Базовый тариф курса"
    payment_methods:              # какие способы оплаты разрешены товару
      - card
      - sbp
      - dolyami
    tags_by_method:               # тег УСПЕХА за каждый способ оплаты (товар+способ -> тег)
      card: "paid_card_basic"
      sbp: "paid_sbp_basic"
      dolyami: "paid_dolyami_basic"
    fail_tags_by_method:          # тег ОТКАЗА (опц.): назначается при terminal-негативе
                                  # провайдера (Долями rejected/canceled). Только для
                                  # способов, перечисленных здесь; иначе тег не шлётся.
                                  # Не гейт доступа — триггер авторассылки «оплата не прошла».
      dolyami: "fail_dolyami_basic"
    variables:                    # доп. переменные контакта (опционально)
      product_name: "Базовый тариф"
      access_level: "basic"
